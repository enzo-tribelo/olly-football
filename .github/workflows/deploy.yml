name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1,4'  # Monday + Thursday 6am UTC
  workflow_dispatch:
    inputs:
      force_taglines:
        description: 'Force regenerate all GPS taglines'
        default: 'false'
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci

      - name: Restore cached GPS data
        uses: actions/cache@v5
        with:
          path: src/content/gps/gps.yaml
          key: gps-data-${{ github.run_id }}
          restore-keys: gps-data-

      - name: Fetch GPS data
        env:
          GPS_PROVIDER_TYPE: playerdata
          GPS_PROVIDER_EMAIL: ${{ secrets.GPS_PROVIDER_EMAIL }}
          GPS_PROVIDER_PASSWORD: ${{ secrets.GPS_PROVIDER_PASSWORD }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          GPS_FORCE_TAGLINES: ${{ github.event.inputs.force_taglines || 'false' }}
        run: node scripts/fetch-gps.mjs

      - name: Sync footage from YouTube
        run: |
          pip install yt-dlp -q
          node scripts/fetch-footage.mjs

      - run: npm run build
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
