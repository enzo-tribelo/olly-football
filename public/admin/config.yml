backend:
  name: github
  repo: aibot-tribelo/olly-football
  branch: main

media_folder: public/photos
public_folder: /photos

collections:
  # Profile
  - name: "profile"
    label: "Player Profile"
    files:
      - label: "Profile Info"
        name: "profile"
        file: "src/content/profile/profile.yaml"
        fields:
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Date of Birth (YYYY-MM)", name: "dob", widget: "string", hint: "Format: 2009-07" }
          - { label: "Height", name: "height", widget: "string", hint: "e.g. 178 cm" }
          - { label: "Weight", name: "weight", widget: "string", hint: "e.g. 77 kg" }
          - { label: "Preferred Foot", name: "foot", widget: "string" }
          - { label: "Position", name: "position", widget: "string" }
          - { label: "Location", name: "location", widget: "string", hint: "e.g. Corsham, Wiltshire" }
          - { label: "Nationality", name: "nationality", widget: "string" }
          - label: "Current Clubs"
            name: "current_clubs"
            widget: "list"
            hint: "Add your current teams"
          - label: "Social Media"
            name: "socials"
            widget: "object"
            fields:
              - { label: "Instagram URL", name: "instagram", widget: "string" }
              - { label: "X/Twitter URL", name: "x", widget: "string" }

  # Seasons
  - name: "seasons"
    label: "Seasons"
    folder: "src/content/seasons"
    create: true
    slug: "{{season}}"
    fields:
      - { label: "Season", name: "season", widget: "string", hint: "e.g. 2025–26" }
      - label: "Clubs"
        name: "clubs"
        widget: "list"
        fields:
          - { label: "Club Name", name: "name", widget: "string" }
          - { label: "League/Competition", name: "league", widget: "string" }
          - { label: "Appearances", name: "apps", widget: "number" }
          - { label: "Goals", name: "goals", widget: "number" }
          - { label: "Assists", name: "assists", widget: "number" }
          - { label: "Minutes Played", name: "mins", widget: "number" }
          - { label: "Team Color (hex code)", name: "color", widget: "string", hint: "e.g. #e63946" }
      - label: "Season Highlights"
        name: "highlights"
        widget: "list"
        hint: "Special achievements this season"
        required: false

  # Matches
  - name: "matches"
    label: "Standout Matches"
    files:
      - label: "All Matches"
        name: "matches"
        file: "src/content/matches/matches.yaml"
        fields:
          - label: "Matches"
            name: "matches"
            widget: "list"
            fields:
              - { label: "Date", name: "date", widget: "string", hint: "e.g. 23/04/23" }
              - { label: "Match", name: "match", widget: "string", hint: "e.g. AFC Corsham vs Frome" }
              - { label: "Result", name: "result", widget: "string", hint: "e.g. Won 5-3" }
              - { label: "Goals", name: "goals", widget: "number" }
              - { label: "Assists", name: "assists", widget: "number" }
              - { label: "Standout Performance?", name: "standout", widget: "boolean", default: true }

  # Honours
  - name: "honours"
    label: "Honours & Awards"
    files:
      - label: "All Honours"
        name: "honours"
        file: "src/content/honours/honours.yaml"
        fields:
          - label: "Honours"
            name: "honours"
            widget: "list"
            fields:
              - { label: "Year/Season", name: "year", widget: "string", hint: "e.g. 2024-25" }
              - { label: "Title/Award", name: "title", widget: "string" }
              - { label: "Organisation", name: "org", widget: "string" }

  # Footage
  - name: "footage"
    label: "Footage & Clips"
    files:
      - label: "All Videos"
        name: "footage"
        file: "src/content/footage/footage.yaml"
        fields:
          - label: "Videos"
            name: "footage"
            widget: "list"
            fields:
              - { label: "YouTube Video ID", name: "id", widget: "string", hint: "The part after v= in the YouTube URL" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "string" }
              - { label: "Type", name: "type", widget: "select", options: ["match", "highlight", "training"] }
              - { label: "Date", name: "date", widget: "string", hint: "YYYY-MM-DD (for sort order)" }

  # Attributes
  - name: "attributes"
    label: "Technical Skills"
    files:
      - label: "All Attributes"
        name: "attributes"
        file: "src/content/attributes/attributes.yaml"
        fields:
          - label: "Attributes"
            name: "attributes"
            widget: "list"
            fields:
              - { label: "Skill Name", name: "name", widget: "string" }
              - { label: "Rating (1-10)", name: "rating", widget: "number", min: 1, max: 10 }
              - { label: "Description", name: "note", widget: "string" }
